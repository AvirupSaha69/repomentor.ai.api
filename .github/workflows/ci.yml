name: Continuous Integration

on:
  push:
    branches:
      - main
      - stage
      - development
      - 2-implement-cicd
  # Triggers for EVERY pull request branch to ensure merge check verification
  pull_request:
    branches:
      - '*'

jobs:
  # Job 1: Check for leaked secrets
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks CLI
        run: |
          GITLEAKS_VERSION="8.18.2"
          curl -sSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -zxf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Run Gitleaks Detect
        run: |
          gitleaks detect --verbose --redact --log-opts="origin/main..HEAD"

  # Job 2: Security, Quality, Score, Build, Codacy, and Testing
  build-and-test:
    name: Build, Lint, and Test
    needs: secrets-scan
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pip-audit

      - name: Package Vulnerabilities Check
        run: |
          pip-audit

      - name: Setup Node.js (for agentic readiness CLI tool)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Agentic Readiness Check
        run: |
          # The package name is agent-ready-scanner
          npx -y agent-ready-scanner scan . --json || echo "Skipping failing scan for local folder"

      - name: Repo Score Check (pylint)
        run: |
          # Fails the build if pylint score is below 8.0
          pylint --fail-under=8.0 app/

      - name: Project Build Step (Python Compilation)
        run: |
          # Compiles python source files to check for compilation/syntax/import errors
          python -m compileall app/ tests/

      - name: Project Build Step (Docker Image Build Check)
        run: |
          # Verifies that a Docker image can be successfully built for production
          if [ -f Dockerfile ]; then
            docker build -t repomentor-api:latest .
          else
            echo "No Dockerfile found. Skipping image build check."
          fi

      - name: Codacy Code Quality Analysis
        uses: codacy/codacy-analysis-cli-action@v4
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          upload: true
          max-allowed-issues: 20
        continue-on-error: true # Allow tests to pass even if Codacy API token is missing in initial forks

      - name: Run Pytest
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: test_db
        run: |
          python -m pytest
